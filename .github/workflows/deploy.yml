name: Deploy to Hostinger via SSH

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Vite project
        # This creates your "dist" folder
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Hostinger via SSH (Rsync)
        uses: easingthemes/ssh-deploy@main
        env:
          # Pulling the secrets you just saved in GitHub
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.HOST_SERVER }}
          REMOTE_USER: ${{ secrets.HOST_USERNAME }}
          REMOTE_PORT: ${{ secrets.HOST_PORT }}
          
          # SOURCE: Upload everything inside the dist/ folder
          SOURCE: "dist/"
          
          # TARGET: The exact folder on your Hostinger server for usapoodle.com
          TARGET: "/home/u128469588/domains/usapoodle.com/public_html/"